version: "3.7"

services:
  app_financeiro:
    image: docker push fabiojr933/projeto-financeiro-app:tagname # O Portainer agora sabe o que baixar
    restart: always
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=c569134002810fcb9195edb9ae0d29ae
      - DB_NAME=financeiro
      - APP_PORT=3020
    networks:
      - fox
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.financeiro-app.rule=Host(`app.foxsistemas.dev.br`)"
      - "traefik.http.routers.financeiro-app.entrypoints=websecure"
      - "traefik.http.routers.financeiro-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.financeiro-app.loadbalancer.server.port=3020"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

networks:
  fox:
    external: true
  traefik_network:
    external: true